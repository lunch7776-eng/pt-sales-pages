<script>
    const LIVE_DATE = null;
    const PAY_URL = "#";

    const pad = (value) => String(value).padStart(2, "0");
    const slots = {
      days: document.querySelector('[data-time="days"]'),
      hours: document.querySelector('[data-time="hours"]'),
      minutes: document.querySelector('[data-time="minutes"]'),
      seconds: document.querySelector('[data-time="seconds"]'),
    };

    function renderEmptyTimer() {
      Object.values(slots).forEach((slot) => {
        slot.textContent = "--";
      });
    }

    function updateTimer() {
      if (!LIVE_DATE) {
        renderEmptyTimer();
        return;
      }
      const target = new Date(LIVE_DATE).getTime();
      const distance = target - Date.now();
      if (!Number.isFinite(target) || distance <= 0) {
        renderEmptyTimer();
        return;
      }
      const totalSeconds = Math.floor(distance / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      slots.days.textContent = String(days);
      slots.hours.textContent = pad(hours);
      slots.minutes.textContent = pad(minutes);
      slots.seconds.textContent = pad(seconds);
    }

    function openPayment(event) {
      if (PAY_URL === "#") {
        event.preventDefault();
        alert("報名連結即將開放");
        return;
      }
      event.currentTarget.setAttribute("href", PAY_URL);
    }

    document.querySelectorAll(".pay-link").forEach((link) => {
      link.setAttribute("href", PAY_URL);
      link.addEventListener("click", openPayment);
    });
    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
